<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Barber Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <!-- LOGIN ADMIN -->
    <section id="admin-login" class="step active">
      <h1>Area Riservata</h1>
      <form id="admin-login-form">
        <input type="email" id="admin-email" placeholder="Email" required>
        <input type="password" id="admin-password" placeholder="Password" required>
        <button type="submit">Accedi</button>
      </form>
      <p id="admin-login-error" class="error-msg"></p>
    </section>

    <!-- DASHBOARD -->
    <section id="admin-dashboard" class="step">
      <nav class="admin-nav">
        <h1>Dashboard</h1>
        <button id="btn-logout" class="secondary outline">Esci</button>
      </nav>

      <div class="grid">
        <!-- Gestione slot -->
        <article>
          <h2>Apri nuovi orari</h2>
          <input type="date" id="admin-date-picker">
          <input type="time" id="admin-time-picker">
          <button id="btn-add-slot">Aggiungi slot</button>
          <p id="add-slot-msg" class="error-msg"></p>

          <h3>Slot per la data selezionata</h3>
          <div id="admin-slots-list"></div>
        </article>

        <!-- Prenotazioni -->
        <article>
          <h2>Prenotazioni ricevute</h2>
          <div id="appointments-list"></div>
        </article>
      </div>

      <article class="ical-box">
        <h2>Sincronizza con Apple Calendar</h2>
        <p class="subtitle">Copia questo link e aggiungilo come "Calendario da URL" su iPhone/Mac:</p>
        <input type="text" id="ical-link" readonly>
        <button id="btn-copy-ical" class="secondary">Copia link</button>
      </article>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
